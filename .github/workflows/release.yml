# .github/workflows/release.yml

name: Release Ledga

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  validate-and-prepare:
    name: Validate Tag and Prepare Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
      - name: Validate Tag and Prepare Version
        working-directory: ledga-desktop
        run: node build/validate-tag-and-prepare-version.cjs prepare
      - name: Upload Updated Package Files
        uses: actions/upload-artifact@v4
        with:
          name: updated-package-files
          path: |
            ledga-desktop/package.json
            ledga-desktop/package-lock.json

  build-macos:
    name: Build & Sign macOS Universal
    needs: validate-and-prepare
    runs-on: macos-14
    steps: 
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Updated Package Files
        uses: actions/download-artifact@v4
        with:
          name: updated-package-files
          path: ledga-desktop/
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
      - name: Create Environment Config
        env: 
          PRODUCTION_VERTEX_CLIENT_EMAIL: ${{ secrets.PRODUCTION_VERTEX_CLIENT_EMAIL }}
          PRODUCTION_VERTEX_PRIVATE_KEY: ${{ secrets.PRODUCTION_VERTEX_PRIVATE_KEY }}
          PRODUCTION_VERTEX_CLIENT_ID: ${{ secrets.PRODUCTION_VERTEX_CLIENT_ID }}
          PRODUCTION_VERTEX_TYPE: ${{ secrets.PRODUCTION_VERTEX_TYPE }}
          PRODUCTION_VERTEX_PROJECT: ${{ secrets.PRODUCTION_VERTEX_PROJECT }}
          PRODUCTION_ELECTRON_STORE_ENCRYPTION_KEY: ${{ secrets.PRODUCTION_ELECTRON_STORE_ENCRYPTION_KEY }}
        run: |
          # Validate that all secrets are present
          if [ -z "PRODUCTION_VERTEX_CLIENT_EMAIL" ] || [ -z "PRODUCTION_VERTEX_PRIVATE_KEY" ] || [ -z "PRODUCTION_VERTEX_CLIENT_ID" ] || [ -z "PRODUCTION_VERTEX_TYPE" ] || [ -z "PRODUCTION_VERTEX_PROJECT" ] || [ -z "PRODUCTION_ELECTRON_STORE_ENCRYPTION_KEY" ]
            echo "Error: One or more production secrets are missing. Please configure them in the repository settings."
            exit 1
          fi

          # Create production .env file
          echo "VITE_ENVIRONMENT=production
            ELECTRON_STORE_ENCRYPTION_KEY=$PRODUCTION_ELECTRON_STORE_ENCRYPTION_KEY
            VERTEX_CLIENT_EMAIL=$PRODUCTION_VERTEX_CLIENT_EMAIL
            VERTEX_CLIENT_ID=$PRODUCTION_VERTEX_CLIENT_ID
            VERTEX_TYPE=${PRODUCTION_VERTEX_TYPE:-service_account}
            VERTEX_PROJECT_ID=$PRODUCTION_VERTEX_PROJECT
          " > ledga-desktop/.env

          echo "VERTEX_PRIVATE_KEY=$PRODUCTION_VERTEX_PRIVATE_KEY" >> ph-app/.env
          echo "Created ledga-desktop/.env"
      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      - name: Setup Apple API Key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p $RUNNER_TEMP/api-keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o $RUNNER_TEMP/api-keys/AuthKey.p8
          echo "API_KEY_PATH=$RUNNER_TEMP/api-keys/AuthKey.p8" >> $GITHUB_ENV
          echo "APPLE_API_KEY=$RUNNER_TEMP/api-keys/AuthKey.p8" >> $GITHUB_ENV
      - name: Authenticate to Google Cloud
        id: auth
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ledga-483319
      - name: Build App
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          APPLE_API_KEY_ID: ${{ secrets.PRODUCTION_APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.PRODUCTION_APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.PRODUCTION_APPLE_TEAM_ID }}
          GH_TOKEN: ${{ github.token }}
        run: npm run build
      - name: Authenticate to Google Cloud for Upload
        id: auth-upload
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.PRODUCTION_GCP_RELEASES_UPLOAD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.PRODUCTION_GCP_RELEASES_UPLOAD_SERVICE_ACCOUNT_EMAIL }}
          project_id: "ledga-483319"
      - name: Set up Cloud SDK for Upload
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ledga-483319
      - name: Upload to GCS
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth-upload.outputs.credentials_file_path }}
        run: |
          if ! command -v gcloud &> /dev/null; then
            echo "Installing Google Cloud SDK..."
            curl https://sdk.cloud.google.com | bash
            export PATH=$HOME/google-cloud-sdk/bin:$PATH
          fi

          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-alpha"* ]]; then
            CHANNEL="alpha"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="latest"
          fi

          echo "Uploading to channel: $CHANNEL"

          gsutil -m cp dist/*.dmg gs://ledga-releases-com/releases/
          gsutil -m cp dist/*.zip gs://ledga-releases-com/releases/
          gsutil -m cp dist/*.blockmap gs://ledga-releases-com/releases/

          # Upload update manifest with correct channel prefix
          if [ -f "dist/${CHANNEL}-mac.yml" ]; then
              gsutil cp dist/${CHANNEL}-mac.yml gs://ledga-releases-com/releases/${CHANNEL}-mac.yml
          else
            echo "Warning: ${CHANNEL}-mac.yml not found in dist/ directory"
            echo "Available files in dist/:"
            ls -la dist/
          fi
          gsutil -m setmeta -h "Cache-Control:public, max-age=3600" gs://ledga-releases-com/releases/*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*-mac.yml
            dist/*.blockmap

  quality-control:
    name: Quality Control - Verify Release Artifacts
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
      - name: Verify Release Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: node build/verify-release-artifacts.cjs